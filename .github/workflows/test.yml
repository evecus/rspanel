name: test

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 v1.0.1)，留空则只上传 Artifact 不发布'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            artifact: rspanel-linux-arm64

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js，构建 Vue 前端
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 3. 安装 Rust，编译后端
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Set version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build Backend
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/easypanel ${{ matrix.artifact }}

      # 4. 始终上传 Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # 5. 有版本号时：发布 Pre-release
  release:
    needs: build
    runs-on: ubuntu-latest
    # tag 触发 或 手动填了版本号 才执行
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 确定版本号（tag触发用tag名，手动触发用输入值）
      - name: Set version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # 下载所有平台的二进制
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      # 发布 GitHub Pre-release
      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: RsPanel ${{ steps.ver.outputs.version }}
          prerelease: true
          files: |
            rspanel-linux-arm64/rspanel-linux-arm64
